name: Locabus Keybox Refresh

# Regenere le code keybox HOURLY peu avant l'heure de prise de chaque reservation,
# pour qu'il soit toujours dans sa fenetre d'activation de 24h (igloohome).
# Le serveur fait tout le tri ; ce workflow ne fait qu'appeler l'endpoint avec le secret.
#
# Robustesse :
# - Hostinger sert parfois un challenge anti-bot (HTTP 403) aux IP GitHub -> 4 tentatives espacees.
# - Un echec isole est SANS CONSEQUENCE (fenetre serveur -30min..+3h, runs toutes les 15 min :
#   le run suivant rattrape). On n'alerte que sur 2 echecs CONSECUTIFS = vrai probleme.

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: read   # necessaire pour lire la conclusion du run precedent

concurrency:
  group: keybox-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Appeler l'endpoint de regeneration (4 tentatives)
        id: call
        run: |
          ok=0
          for i in 1 2 3 4; do
            code=$(curl -s -o /tmp/resp.json -w "%{http_code}" --max-time 90 -X POST \
              "https://locabus.ch/wp-json/locabus/v1/keybox/refresh-imminent" \
              -H "X-Locabus-Token: ${{ secrets.LOCABUS_KEYBOX_TOKEN }}")
            echo "tentative $i : HTTP $code"
            if [ "$code" = "200" ]; then
              ok=1
              cat /tmp/resp.json || true
              echo ""
              break
            fi
            sleep 45
          done
          if [ "$ok" != "1" ]; then
            echo "::warning::Echec apres 4 tentatives (HTTP $code) - probablement challenge anti-bot Hostinger"
            echo "failed=1" >> "$GITHUB_OUTPUT"
          fi

      - name: N'alerter que sur 2 echecs consecutifs
        if: steps.call.outputs.failed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prev=$(gh run list --repo "${{ github.repository }}" --workflow "Locabus Keybox Refresh" \
                 --limit 2 --json conclusion --jq '.[1].conclusion' 2>/dev/null || echo "unknown")
          echo "Conclusion du run precedent : $prev"
          if [ "$prev" = "failure" ]; then
            echo "::error::2 echecs consecutifs du refresh keybox - verifier locabus.ch (anti-bot / endpoint)"
            exit 1
          fi
          echo "Echec isole : le prochain run (15 min) rattrape, fenetre serveur large. Pas d'alerte."
